<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f7c9ce">
    <title>小猪的每日抽卡</title>
    <style>
:root {
  --ink: #30263f;
  --muted: #7d6471;
  --paper: #fff8f0;
  --rose: #ff8fa8;
  --coral: #f46f6f;
  --gold: #ffd57a;
  --mint: #87d9c8;
  --blue: #5f8bc4;
  --shadow: 0 22px 52px rgba(91, 55, 73, 0.22);
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
  color: var(--ink);
  background:
    radial-gradient(circle at 14% 10%, rgba(255, 213, 122, 0.48), transparent 24%),
    radial-gradient(circle at 88% 18%, rgba(135, 217, 200, 0.28), transparent 22%),
    linear-gradient(155deg, #fff4ed 0%, #ffd5d5 38%, #b6d5ee 100%);
  font-family:
    "SF Pro Display",
    "PingFang SC",
    "Microsoft YaHei",
    system-ui,
    sans-serif;
}

body {
  min-height: 100svh;
}

button {
  border: 0;
  color: inherit;
  font: inherit;
}

input,
textarea {
  width: 100%;
  border: 1px solid rgba(161, 83, 105, 0.18);
  border-radius: 8px;
  color: var(--ink);
  background: rgba(255, 255, 255, 0.62);
  font: inherit;
  outline: none;
}

input {
  min-height: 44px;
  padding: 0 12px;
}

textarea {
  padding: 12px;
  resize: vertical;
}

.phone-shell {
  width: min(100%, 520px);
  min-height: 100svh;
  margin: 0 auto;
  padding: max(18px, env(safe-area-inset-top)) 18px max(24px, env(safe-area-inset-bottom));
}

.hero {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  padding-top: 12px;
}

.eyebrow {
  display: block;
  margin-bottom: 8px;
  color: #a15369;
  font-size: 0.68rem;
  font-weight: 900;
  letter-spacing: 0.15em;
}

h1,
h2,
p {
  margin: 0;
}

h1 {
  max-width: none;
  color: #392848;
  font-family:
    "YouYuan",
    "Microsoft YaHei UI",
    "Comic Sans MS",
    "PingFang SC",
    system-ui,
    sans-serif;
  font-size: clamp(1.85rem, 7vw, 2.65rem);
  font-weight: 900;
  line-height: 0.98;
  letter-spacing: 0;
  white-space: nowrap;
}

.hero-copy p {
  max-width: 20rem;
  margin-top: 16px;
  color: var(--muted);
  font-size: 0.98rem;
  line-height: 1.65;
}

.round-icon {
  display: grid;
  flex: 0 0 auto;
  width: 44px;
  height: 44px;
  place-items: center;
  border-radius: 50%;
  background: rgba(255, 248, 240, 0.72);
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.64), 0 14px 30px rgba(91, 55, 73, 0.16);
}

.round-icon.small {
  width: 36px;
  height: 36px;
  font-size: 1.1rem;
}

.countdown-panel {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 12px;
  align-items: center;
  margin-top: 26px;
  padding: 16px;
  border-radius: 8px;
  background: rgba(255, 248, 240, 0.76);
  box-shadow: var(--shadow);
}

.countdown-panel span {
  color: #5a324b;
  font-size: clamp(1.02rem, 4.5vw, 1.28rem);
  font-weight: 900;
  line-height: 1.35;
}

.countdown-panel strong {
  justify-self: end;
  color: #56304c;
  font-size: clamp(1rem, 5vw, 1.35rem);
  letter-spacing: 0;
}

.starter-gift {
  position: absolute;
  top: 14px;
  left: 14px;
  z-index: 3;
  display: grid;
  gap: 6px;
  justify-items: center;
  padding: 0;
  border: 0;
  background: transparent;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.starter-gift[hidden] {
  display: none;
}

.starter-gift-body {
  position: relative;
  display: grid;
  place-items: center;
  width: 58px;
  height: 58px;
  animation: giftFloat 2.4s ease-in-out infinite;
}

.starter-gift-box {
  position: relative;
  display: block;
  width: 46px;
  height: 34px;
  border-radius: 6px;
  background: linear-gradient(160deg, #ffb8c8 0%, #ff8fa8 55%, #f46f6f 100%);
  box-shadow:
    inset 0 -6px 0 rgba(180, 62, 88, 0.18),
    0 10px 22px rgba(244, 111, 111, 0.28);
}

.starter-gift-box::before,
.starter-gift-box::after {
  position: absolute;
  top: 18px;
  width: 8px;
  height: 100%;
  border-radius: 4px;
  background: rgba(255, 248, 240, 0.55);
  content: "";
}

.starter-gift-box::before {
  left: 50%;
  transform: translateX(-50%);
}

.starter-gift-box::after {
  left: 50%;
  width: 100%;
  height: 8px;
  top: 50%;
  transform: translate(-50%, -50%);
}

.starter-gift-lid {
  position: absolute;
  top: 4px;
  z-index: 1;
  width: 50px;
  height: 14px;
  border-radius: 6px 6px 4px 4px;
  background: linear-gradient(180deg, #ffe9a8, #ffd57a);
  box-shadow: 0 4px 10px rgba(255, 213, 122, 0.35);
  transform-origin: center bottom;
  animation: giftLidWiggle 2.4s ease-in-out infinite;
}

.starter-gift-bow {
  position: absolute;
  top: -2px;
  z-index: 2;
  width: 22px;
  height: 14px;
  border-radius: 999px;
  background: #ffd57a;
  box-shadow:
    -12px 0 0 -4px #ff8fa8,
    12px 0 0 -4px #ff8fa8;
}

.starter-gift-bow::after {
  position: absolute;
  left: 50%;
  top: 8px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #f46f6f;
  transform: translateX(-50%);
  content: "";
}

.starter-gift-label {
  padding: 4px 10px;
  border-radius: 999px;
  color: #7a3f55;
  font-size: 0.68rem;
  font-weight: 900;
  letter-spacing: 0.08em;
  background: rgba(255, 248, 240, 0.88);
  box-shadow: inset 0 0 0 1px rgba(255, 143, 168, 0.28), 0 8px 18px rgba(91, 55, 73, 0.12);
}

.starter-gift-spark {
  position: absolute;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #ffd57a;
  opacity: 0;
  pointer-events: none;
}

.starter-gift-spark-a {
  top: 6px;
  right: 2px;
  animation: giftSpark 2.2s ease-in-out infinite;
}

.starter-gift-spark-b {
  top: 22px;
  left: 0;
  background: #87d9c8;
  animation: giftSpark 2.2s ease-in-out infinite 0.8s;
}

.starter-gift:active:not(.is-claiming) .starter-gift-body {
  animation: giftTap 280ms ease;
}

.starter-gift.is-claiming .starter-gift-body {
  animation: giftClaimPop 520ms cubic-bezier(0.2, 0.9, 0.2, 1) forwards;
}

.starter-gift.is-claiming .starter-gift-spark-a,
.starter-gift.is-claiming .starter-gift-spark-b {
  animation: giftBurst 520ms ease-out forwards;
}

.starter-gift.is-claiming .starter-gift-label {
  animation: giftLabelFade 420ms ease forwards;
}

@keyframes giftFloat {
  0%,
  100% {
    transform: translateY(0);
  }

  50% {
    transform: translateY(-6px);
  }
}

@keyframes giftLidWiggle {
  0%,
  100% {
    transform: rotate(0deg);
  }

  25% {
    transform: rotate(-4deg);
  }

  75% {
    transform: rotate(4deg);
  }
}

@keyframes giftSpark {
  0%,
  100% {
    opacity: 0;
    transform: scale(0.4);
  }

  45% {
    opacity: 0.95;
    transform: scale(1);
  }
}

@keyframes giftTap {
  0% {
    transform: scale(1);
  }

  40% {
    transform: scale(0.88);
  }

  100% {
    transform: scale(1.04);
  }
}

@keyframes giftClaimPop {
  0% {
    transform: scale(1);
    opacity: 1;
  }

  35% {
    transform: scale(1.18) rotate(-6deg);
  }

  100% {
    transform: scale(0.2) rotate(12deg);
    opacity: 0;
  }
}

@keyframes giftBurst {
  0% {
    opacity: 0;
    transform: scale(0.2);
  }

  30% {
    opacity: 1;
  }

  100% {
    opacity: 0;
    transform: scale(2.8) translateY(-18px);
  }
}

@keyframes giftLabelFade {
  to {
    opacity: 0;
    transform: translateY(6px);
  }
}

.draw-stage {
  position: relative;
  margin-top: 18px;
  padding: 22px 16px 18px;
  overflow: hidden;
  border-radius: 8px;
  background:
    linear-gradient(150deg, rgba(255, 248, 240, 0.82), rgba(255, 226, 217, 0.68)),
    rgba(255, 248, 240, 0.72);
  box-shadow: var(--shadow);
}

.decor {
  position: absolute;
  z-index: 0;
  color: rgba(161, 83, 105, 0.18);
  font-weight: 900;
  pointer-events: none;
}

.decor-star {
  top: 14px;
  right: 18px;
  font-size: 3.5rem;
}

.decor-note {
  bottom: 18px;
  left: 18px;
  color: rgba(95, 139, 196, 0.34);
  font-size: 0.82rem;
}

.stage-charm {
  position: absolute;
  z-index: 0;
  display: grid;
  place-items: center;
  pointer-events: none;
}

.stage-charm-star {
  top: 18px;
  right: 22px;
  width: 44px;
  height: 44px;
  color: rgba(161, 83, 105, 0.34);
  transform: rotate(10deg);
}

.stage-charm-star::before {
  font-size: 2.1rem;
  line-height: 1;
  text-shadow: 0 8px 18px rgba(161, 83, 105, 0.12);
  content: "✦";
}

.stage-charm-heart {
  left: 22px;
  bottom: 74px;
  width: 42px;
  height: 32px;
  color: rgba(244, 111, 111, 0.32);
  transform: rotate(-12deg);
}

.stage-charm-heart::before {
  padding: 4px 9px;
  border-radius: 999px;
  background: rgba(255, 248, 240, 0.42);
  box-shadow: inset 0 0 0 1px rgba(244, 111, 111, 0.14);
  font-size: 1rem;
  line-height: 1;
  content: "♡";
}

.card-wrap {
  position: relative;
  z-index: 1;
  width: min(78vw, 292px);
  aspect-ratio: 0.68;
  margin: 0 auto 22px;
  perspective: 1100px;
}

.draw-card {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transition: transform 720ms cubic-bezier(0.2, 0.72, 0.18, 1);
}

.draw-card.is-flipped {
  transform: rotateY(180deg);
}

.draw-card.is-drawing {
  animation: drawPulse 920ms ease-in-out;
}

@keyframes drawPulse {
  0%,
  100% {
    transform: translateY(0) rotateY(0deg);
  }

  34% {
    transform: translateY(-18px) rotateZ(-3deg);
  }

  68% {
    transform: translateY(-8px) rotateZ(4deg);
  }
}

.card-face {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 24px;
  overflow: hidden;
  border-radius: 18px;
  backface-visibility: hidden;
  background:
    radial-gradient(circle at 20% 18%, rgba(255, 255, 255, 0.74), transparent 28%),
    linear-gradient(150deg, var(--paper), #ffe2d9);
  box-shadow:
    inset 0 0 0 1px rgba(255, 255, 255, 0.72),
    0 24px 46px rgba(91, 55, 73, 0.24);
}

.draw-card.tier-a .card-back {
  background:
    radial-gradient(circle at 20% 18%, rgba(255, 255, 255, 0.76), transparent 28%),
    linear-gradient(150deg, #f2fff8, #8fc9b6 48%, #3f876f);
}

.draw-card.tier-s .card-back {
  background:
    radial-gradient(circle at 20% 18%, rgba(255, 255, 255, 0.76), transparent 28%),
    linear-gradient(150deg, #ffffff, #e7eaf0 46%, #cfd5df);
}

.draw-card.tier-sr .card-back {
  background:
    radial-gradient(circle at 20% 18%, rgba(255, 255, 255, 0.8), transparent 28%),
    linear-gradient(150deg, #fff8dc, #f3bd35 50%, #c7871f);
}

.draw-card.tier-ssr .card-back {
  background:
    radial-gradient(circle at 18% 14%, rgba(255, 255, 255, 0.96), transparent 30%),
    linear-gradient(135deg, #ffffff, #b8f2ff 28%, #e8dcff 58%, #fff2ad 100%);
  box-shadow:
    inset 0 0 0 1px rgba(255, 255, 255, 0.86),
    0 26px 58px rgba(62, 126, 172, 0.32),
    0 0 42px rgba(184, 242, 255, 0.38);
}

.draw-card.tier-ssr .card-back h2,
.draw-card.tier-ssr .card-back strong {
  color: #153a5a;
}

.draw-card.tier-ssr .card-back p {
  color: rgba(22, 51, 71, 0.76);
}

.card-face::before {
  position: absolute;
  right: -32px;
  bottom: -34px;
  width: 118px;
  height: 118px;
  border-radius: 50%;
  background: var(--accent, var(--rose));
  opacity: 0.24;
  content: "";
}

.card-front {
  text-align: left;
}

.card-front h2,
.card-back h2 {
  position: relative;
  z-index: 1;
  color: #402848;
  font-size: clamp(1.8rem, 8vw, 2.6rem);
  line-height: 1.08;
  letter-spacing: 0;
  overflow-wrap: anywhere;
}

.card-front p,
.card-back p {
  position: relative;
  z-index: 1;
  color: var(--muted);
  font-size: 0.98rem;
  line-height: 1.7;
  overflow-wrap: anywhere;
}

.card-back {
  transform: rotateY(180deg);
}

.card-rarity {
  position: relative;
  z-index: 1;
  align-self: flex-start;
  padding: 7px 12px;
  color: #4c3548;
  font-size: 0.74rem;
  font-weight: 900;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.58);
}

#cardAction {
  position: relative;
  z-index: 1;
  display: block;
  color: #a15369;
  font-size: 0.92rem;
  line-height: 1.5;
  overflow-wrap: anywhere;
}


.draw-button {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  width: min(100%, 320px);
  min-height: 56px;
  margin: 0 auto;
  border-radius: 999px;
  color: #fff8f0;
  font-weight: 900;
  background: linear-gradient(135deg, #f46f6f, #ff8fa8 58%, #5f8bc4);
  box-shadow: 0 18px 32px rgba(161, 83, 105, 0.28);
  transition: transform 160ms ease, filter 160ms ease;
}

.draw-button:active,
.round-icon:active {
  transform: scale(0.97);
}

.draw-button:disabled {
  filter: saturate(0.58);
  opacity: 0.72;
}

.reset-copy {
  position: relative;
  z-index: 1;
  margin-top: 13px;
  color: var(--muted);
  font-size: 0.85rem;
  line-height: 1.5;
  text-align: center;
}

.collection-entry {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  width: min(100%, 320px);
  min-height: 52px;
  margin: 16px auto 0;
  padding: 0 16px 0 20px;
  border-radius: 999px;
  color: #4c3548;
  font-weight: 900;
  background:
    linear-gradient(135deg, rgba(255, 255, 255, 0.82), rgba(255, 213, 122, 0.4)),
    rgba(255, 248, 240, 0.7);
  box-shadow: 0 16px 28px rgba(91, 55, 73, 0.16), inset 0 0 0 1px rgba(255, 255, 255, 0.58);
  overflow: hidden;
  transition: transform 160ms ease, filter 160ms ease, box-shadow 160ms ease;
}

.collection-entry strong {
  color: #a15369;
  font-size: 0.9rem;
}

.collection-entry::after {
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.5), transparent);
  opacity: 0;
  transform: translateX(-70%);
  content: "";
  pointer-events: none;
}

.collection-entry:active {
  transform: translateY(2px) scale(0.98);
  filter: saturate(1.08);
  box-shadow: 0 10px 20px rgba(91, 55, 73, 0.14), inset 0 0 0 1px rgba(255, 255, 255, 0.7);
}

.collection-entry:active::after {
  opacity: 1;
  transform: translateX(70%);
  transition: transform 280ms ease, opacity 160ms ease;
}

.usage-panel {
  position: relative;
  z-index: 1;
  margin-top: 16px;
  padding: 16px;
  border-radius: 8px;
  background: rgba(255, 248, 240, 0.66);
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.48);
}

.usage-panel.is-hidden,
.memory-field.is-hidden,
.think-button.is-hidden {
  display: none;
}

.usage-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.usage-head h2 {
  color: #392848;
  font-size: 1.05rem;
}

.use-card-button {
  flex: 0 0 auto;
  min-height: 40px;
  padding: 0 14px;
  border-radius: 999px;
  color: #fff8f0;
  font-size: 0.88rem;
  font-weight: 900;
  background: linear-gradient(135deg, #f46f6f, #ff8fa8 58%, #5f8bc4);
}

.use-card-button:disabled {
  color: #5f4b58;
  background: rgba(125, 100, 113, 0.16);
}

.used-time {
  margin-top: 10px;
  color: var(--muted);
  font-size: 0.84rem;
  line-height: 1.5;
}

.memory-field {
  display: grid;
  gap: 8px;
  margin-top: 12px;
  color: var(--muted);
  font-size: 0.86rem;
  font-weight: 900;
}

#editCustomFromUsageButton {
  width: 100%;
  margin-top: 12px;
}

.collection-section {
  margin-top: 22px;
  padding-bottom: 10px;
}

.collection-page {
  position: fixed;
  inset: 0;
  z-index: 8;
  width: min(100%, 520px);
  margin: 0 auto;
  overflow: auto;
  padding: max(18px, env(safe-area-inset-top)) 18px max(24px, env(safe-area-inset-bottom));
  background:
    radial-gradient(circle at 14% 10%, rgba(255, 213, 122, 0.48), transparent 24%),
    radial-gradient(circle at 88% 18%, rgba(135, 217, 200, 0.28), transparent 22%),
    linear-gradient(155deg, #fff4ed 0%, #ffd5d5 38%, #b6d5ee 100%);
  animation: collectionIn 180ms ease-out both;
}

.collection-page.is-hidden {
  display: none;
}

@keyframes collectionIn {
  from {
    opacity: 0;
    transform: translateY(14px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.section-title {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 14px;
}

.section-title h2 {
  color: #392848;
  font-size: 1.35rem;
}

.section-title strong {
  color: #a15369;
  font-size: 0.92rem;
}

.collection-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.collection-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
}

.mini-card {
  min-height: 122px;
  padding: 12px;
  border-radius: 8px;
  background:
    linear-gradient(150deg, rgba(255, 248, 240, 0.86), rgba(255, 236, 222, 0.72)),
    var(--paper);
  box-shadow: 0 16px 32px rgba(91, 55, 73, 0.16);
  transition: transform 160ms ease, filter 160ms ease;
}

.mini-card.tier-ssr {
  position: relative;
  overflow: hidden;
  color: #163347;
  background:
    linear-gradient(135deg, rgba(255, 255, 255, 0.94), rgba(184, 242, 255, 0.84) 34%, rgba(230, 214, 255, 0.92) 68%, rgba(255, 245, 184, 0.82)),
    rgba(230, 250, 255, 0.86);
  box-shadow:
    0 18px 38px rgba(62, 126, 172, 0.26),
    inset 0 0 0 1px rgba(255, 255, 255, 0.78),
    inset 0 0 26px rgba(255, 255, 255, 0.46);
}

.mini-card.tier-s {
  color: #323844;
  background:
    linear-gradient(145deg, rgba(255, 255, 255, 0.94), rgba(232, 235, 242, 0.88) 46%, rgba(203, 210, 222, 0.76)),
    rgba(245, 246, 249, 0.9);
  box-shadow:
    0 16px 32px rgba(89, 99, 116, 0.18),
    inset 0 0 0 1px rgba(255, 255, 255, 0.74);
}

.mini-card.tier-s span {
  color: #303746;
  background: linear-gradient(135deg, #ffffff, #d6dce8 62%, #b9c1cf);
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.66);
}

.mini-card.tier-sr {
  color: #3f2a12;
  background:
    linear-gradient(145deg, rgba(255, 248, 220, 0.96), rgba(243, 189, 53, 0.64) 48%, rgba(199, 135, 31, 0.5)),
    rgba(255, 244, 203, 0.9);
  box-shadow:
    0 16px 34px rgba(160, 104, 24, 0.2),
    inset 0 0 0 1px rgba(255, 255, 255, 0.68);
}

.mini-card.tier-sr span {
  color: #4f310d;
  background: linear-gradient(135deg, #fff6cf, #f3bd35 62%, #c7871f);
  box-shadow: 0 0 16px rgba(243, 189, 53, 0.42);
}

.mini-card.tier-a {
  color: #173a32;
  background:

function boot() {
  els.drawButton.addEventListener("click", drawCard);
  els.refreshButton.addEventListener("click", loadState);
  els.openCollectionButton.addEventListener("click", openCollectionPage);
  els.closeCollectionButton.addEventListener("click", closeCollectionPage);
  els.closeDetailButton.addEventListener("click", closeCardDetail);
  els.cardDetail.addEventListener("click", (event) => {
    if (event.target === els.cardDetail) {
      closeCardDetail();
    }
  });
  els.useCardButton.addEventListener("click", markCurrentCardUsed);
  els.memoryInput.addEventListener("input", queueMemorySave);
  els.detailUseCardButton.addEventListener("click", markDetailCardUsed);
  els.detailMemoryInput.addEventListener("input", queueDetailMemorySave);
  els.closeEditorButton.addEventListener("click", () => {
    els.customEditor.classList.add("is-hidden");
  });
  if (els.starterGift) {
    els.starterGift.hidden = true;
  }

  startCountdown();
  loadState();
}

function loadState() {
  renderPublicState(buildPublicState());
}

async function drawCard() {
  const publicState = buildPublicState();

  if (publicState.drawEnded) {
    setEndedState(publicState);
    return;
  }

  resetCardFront();
  els.drawButton.disabled = true;
  els.drawButton.querySelector("span").textContent = "正在洗牌...";
  els.drawCard.classList.add("is-drawing");

  await wait(850);

  const pickedCard = pickUncollectedCard();
  if (!pickedCard) {
    const endedState = buildPublicState();
    setEndedState(endedState);
    els.drawCard.classList.remove("is-drawing");
    return;
  }

  const localState = readLocalState();
  const now = new Date().toISOString();
  localState.collectionIds.push(pickedCard.id);
  localState.history.push({
    cardId: pickedCard.id,
    drawnAt: now
  });
  writeLocalState(localState);

  const hydratedCard = hydrateCard(pickedCard, localState);
  renderCard(hydratedCard);
  await wait(120);
  els.drawCard.classList.remove("is-drawing");
  els.drawCard.classList.add("is-flipped");
  const nextPublicState = buildPublicState();
  renderPublicState(nextPublicState, hydratedCard);
  setStatus(nextPublicState.drawEnded ? "已经抽卡结束" : "已抽取一份喜欢~");
}

function buildPublicState() {
  const localState = readLocalState();
  const collectedIds = new Set(localState.collectionIds);
  const collection = localState.collectionIds
    .map((id) => getCardById(id, localState))
    .filter(Boolean);
  const collectionSlots = cards.map((card) => {
    const collected = collectedIds.has(card.id);
    return {
      slot: card.slot,
      collected,
      collectedAt: getCollectedAt(card.id, localState),
      rarityTier: card.rarityTier,
      accent: getCardAccent(card),
      isCustom: false,
      card: collected ? getCardById(card.id, localState) : card
    };
  });
  const remainingCards = cards.length - collection.length;

  return {
    targetDate: CONFIG.targetDate.toISOString(),
    collection,
    collectionSlots,
    totalCards: cards.length,
    remainingCards,
    drawEnded: remainingCards <= 0,
    canDrawToday: remainingCards > 0
  };
}

function renderPublicState(data, justDrawnCard = null) {
  const countText = `${data.collection.length} / ${data.totalCards}`;
  els.collectionCount.textContent = countText;
  els.collectionEntryCount.textContent = countText;
  renderCollection(data.collectionSlots || []);

  if (justDrawnCard) {
    renderCard(justDrawnCard);
    els.drawCard.classList.add("is-flipped");
  } else if (!state.currentCard) {
    resetCardFront();
  }

  if (data.drawEnded) {
    setEndedState(data);
    return;
  }

  els.drawButton.disabled = false;
  els.drawButton.querySelector("span").textContent = "抽取一张卡片";
  els.resetCopy.textContent = `还剩 ${data.remainingCards} 张可抽卡，抽完就会显示结束。`;
  if (!justDrawnCard) {
    setStatus("还可以继续抽卡哦~");
  }
}

function setEndedState(data) {
  els.drawButton.disabled = true;
  els.drawButton.querySelector("span").textContent = "已经抽卡结束";
  els.resetCopy.textContent = "已经抽卡结束";
  setStatus("已经抽卡结束");
  if (!state.currentCard) {
    resetCardFront();
  }
}

function pickUncollectedCard() {
  const localState = readLocalState();
  const collectedIds = new Set(localState.collectionIds);
  const pool = cards.filter((card) => !collectedIds.has(card.id));
  const totalWeight = pool.reduce((sum, card) => sum + getRarityWeight(card), 0);
  let roll = Math.random() * totalWeight;

  for (const card of pool) {
    roll -= getRarityWeight(card);
    if (roll <= 0) {
      return card;
    }
  }

  return pool[pool.length - 1] || null;
}

function renderCard(card) {
  if (!card) {
    resetCardFront();
    return;
  }

  state.currentCard = card;
  const tier = String(card.rarityTier || "A").toLowerCase();
  els.drawCard.className = `draw-card tier-${tier} ${els.drawCard.classList.contains("is-flipped") ? "is-flipped" : ""}`;
  els.cardWrap.style.setProperty("--accent", getCardAccent(card));
  els.frontRarity.textContent = card.frontText || "小猪专属";
  els.frontText.textContent = card.title || "今日卡片";
  els.cardRarity.textContent = `${card.rarityName || card.rarityTier || "A"} · ${trimEndingPeriod(card.rarityLine || getRarityLine(card))}`;
  els.cardTitle.textContent = card.backTitle || card.title || "今天抽到";
  els.cardText.textContent = card.backText || "这张卡的内容还在路上。";
  els.cardAction.textContent = card.actionText || "今日兑换";
  renderUsagePanel(card);
}

function resetCardFront() {
  els.drawCard.className = "draw-card";
  hideUsagePanel();
  els.cardWrap.style.setProperty("--accent", "#ff8fa8");
  els.frontRarity.textContent = "小猪专属";
  els.frontText.textContent = "这次会抽到什么呢";
  els.cardRarity.textContent = "等待";
  els.cardTitle.textContent = "等待抽卡";
  els.cardText.textContent = "卡片会在这里翻开。";
  els.cardAction.textContent = "本次兑换";
}

function renderCollection(slots) {
  els.collectionGrid.innerHTML = "";

  slots.forEach((slot) => {
    const card = slot.card;
    const tier = (card?.rarityTier || slot.rarityTier || "").toLowerCase();
    const item = document.createElement("article");
    item.className = `mini-card ${slot.collected ? "is-collected" : "is-locked"} ${tier ? `tier-${tier}` : ""}`;
    item.style.setProperty("--accent", getCardAccent(card || slot));
    item.innerHTML = `
      <span>${slot.collected ? escapeHtml(card.rarityName || card.rarityTier || "A") : `${escapeHtml(slot.rarityTier || "?")} · No. ${pad(slot.slot)}`}</span>
      <h3>${slot.collected ? escapeHtml(card.title || "小猪卡") : "未解锁"}</h3>
      <p>${slot.collected ? `<b>${escapeHtml(formatCollectedDate(slot.collectedAt))}</b><br>${escapeHtml(collectionSubtitle(card))}` : "等待小猪抽到这张卡。"}</p>
    `;

    if (slot.collected && card) {
      item.addEventListener("click", () => openCardDetail(card));
    }

    els.collectionGrid.appendChild(item);
  });
}

function collectionSubtitle(card) {
  if (card.usage?.usedAt) {
    return "已经使用，留下了一段回忆。";
  }

  return card.actionText || card.backTitle || "已经收藏";
}

function openCollectionPage() {
  els.collectionPage.classList.remove("is-hidden");
}

function closeCollectionPage() {
  els.collectionPage.classList.add("is-hidden");
}

function openCardDetail(card) {
  state.detailCard = card;
  const tier = String(card.rarityTier || "A").toLowerCase();
  els.detailCard.className = `detail-card tier-${tier}`;
  els.detailCard.style.setProperty("--accent", getCardAccent(card));
  els.detailRarity.textContent = `${card.rarityName || card.rarityTier || "A"} · No. ${pad(card.slot)}`;
  els.detailTitle.textContent = card.backTitle || card.title || "小猪卡";
  els.detailText.textContent = card.backText || "这张卡的内容还在路上。";
  els.detailAction.textContent = card.actionText || "今日兑换";
  renderDetailUsagePanel(card);
  els.cardDetail.classList.remove("is-hidden");
}

function closeCardDetail() {
  window.clearTimeout(state.detailMemorySaveTimer);
  els.cardDetail.classList.add("is-hidden");
  state.detailCard = null;
}

function renderUsagePanel(card) {
  if (!card?.id) {
    hideUsagePanel();
    return;
  }

  const used = Boolean(card.usage?.usedAt);
  els.usagePanel.classList.remove("is-hidden");
  els.useCardButton.disabled = false;
  els.useCardButton.textContent = used ? "取消使用" : "使用这张卡";
  els.usedTimeText.textContent = used
    ? `使用时间：${formatFullDateTime(card.usage.usedAt)}`
    : "使用后会记录时间，也可以写下这张卡带来的回忆。";
  els.memoryField.classList.toggle("is-hidden", !used);
  els.memoryInput.value = card.usage?.memory || "";
  els.editCustomFromUsageButton.classList.add("is-hidden");
  els.usageMessage.textContent = used ? "修改回忆时会自动保存在这个浏览器里。" : "";
}

function renderDetailUsagePanel(card) {
  const used = Boolean(card.usage?.usedAt);
  els.detailUseCardButton.disabled = false;
  els.detailUseCardButton.textContent = used ? "取消使用" : "使用这张卡";
  els.detailUsedTimeText.textContent = used
    ? `使用时间：${formatFullDateTime(card.usage.usedAt)}`
    : "使用后会记录时间，也可以写下这张卡带来的回忆。";
  els.detailMemoryField.classList.toggle("is-hidden", !used);
  els.detailMemoryInput.value = card.usage?.memory || "";
  els.detailEditCustomButton.classList.add("is-hidden");
  els.detailUsageMessage.textContent = used ? "修改回忆时会自动保存在这个浏览器里。" : "";
}

function hideUsagePanel() {
  els.usagePanel.classList.add("is-hidden");
  els.usageMessage.textContent = "";
}

function markCurrentCardUsed() {
  if (!state.currentCard) {
    return;
  }

  const updatedCard = toggleCardUsage(state.currentCard.id, els.memoryInput.value.trim());
  state.currentCard = updatedCard;
  renderPublicState(buildPublicState(), updatedCard);
  renderCard(updatedCard);
  els.drawCard.classList.add("is-flipped");
  els.usageMessage.textContent = updatedCard.usage?.usedAt
    ? "已经标记使用，可以写下这次的回忆。"
    : "已经恢复为未使用。";
}

function markDetailCardUsed() {
  if (!state.detailCard) {
    return;
  }

  const updatedCard = toggleCardUsage(state.detailCard.id, els.detailMemoryInput.value.trim());
  state.detailCard = updatedCard;
  renderPublicState(buildPublicState());
  openCardDetail(updatedCard);
  els.detailUsageMessage.textContent = updatedCard.usage?.usedAt
    ? "已经标记使用，可以写下这次的回忆。"
    : "已经恢复为未使用。";
}

function toggleCardUsage(cardId, memory) {
  const localState = readLocalState();
  const existing = localState.usageById[cardId] || {};

  if (existing.usedAt) {
    localState.usageById[cardId] = {
      memory: existing.memory || memory || ""
    };
  } else {
    localState.usageById[cardId] = {
      usedAt: new Date().toISOString(),
      memory: memory || existing.memory || ""
    };
  }

  writeLocalState(localState);
  return getCardById(cardId, localState);
}

function queueMemorySave() {
  if (!state.currentCard?.usage?.usedAt) {
    return;
  }

  window.clearTimeout(state.memorySaveTimer);
  els.usageMessage.textContent = "正在保存回忆...";
  state.memorySaveTimer = window.setTimeout(() => {
    const updatedCard = saveCardMemory(state.currentCard.id, els.memoryInput.value.trim());
    state.currentCard = updatedCard;
    renderPublicState(buildPublicState(), updatedCard);
    renderCard(updatedCard);
    els.drawCard.classList.add("is-flipped");
    els.usageMessage.textContent = "回忆已经保存在这个浏览器里。";
  }, 650);
}

function queueDetailMemorySave() {
  if (!state.detailCard?.usage?.usedAt) {
    return;
  }

  window.clearTimeout(state.detailMemorySaveTimer);
  els.detailUsageMessage.textContent = "正在保存回忆...";
  state.detailMemorySaveTimer = window.setTimeout(() => {
    const updatedCard = saveCardMemory(state.detailCard.id, els.detailMemoryInput.value.trim());
    state.detailCard = updatedCard;
    renderPublicState(buildPublicState());
    openCardDetail(updatedCard);
    els.detailUsageMessage.textContent = "回忆已经保存在这个浏览器里。";
  }, 650);
}

function saveCardMemory(cardId, memory) {
  const localState = readLocalState();
  const existing = localState.usageById[cardId] || {};
  localState.usageById[cardId] = {
    ...existing,
    memory
  };
  writeLocalState(localState);
  return getCardById(cardId, localState);
}

function readLocalState() {
  const fallback = {
    collectionIds: [],
    history: [],
    usageById: {}
  };

  try {
    const parsed = JSON.parse(localStorage.getItem(CONFIG.storageKey) || "null");
    if (!parsed || typeof parsed !== "object") {
      return fallback;
    }

    return {
      collectionIds: Array.isArray(parsed.collectionIds)
        ? parsed.collectionIds.filter((id, index, all) => cards.some((card) => card.id === id) && all.indexOf(id) === index)
        : [],
      history: Array.isArray(parsed.history) ? parsed.history : [],
      usageById: parsed.usageById && typeof parsed.usageById === "object" ? parsed.usageById : {}
    };
  } catch (error) {
    return fallback;
  }
}

function writeLocalState(nextState) {
  localStorage.setItem(CONFIG.storageKey, JSON.stringify(nextState));
}

function getCardById(cardId, localState = readLocalState()) {
  const card = cards.find((item) => item.id === cardId);
  if (!card) {
    return null;
  }

  return hydrateCard(card, localState);
}

function hydrateCard(card, localState = readLocalState()) {
  return {
    ...card,
    accent: getCardAccent(card),
    rarityLine: card.rarityLine || getRarityLine(card),
    collectedAt: getCollectedAt(card.id, localState),
    usage: localState.usageById[card.id] || {}
  };
}

function getCollectedAt(cardId, localState) {
  const record = [...(localState.history || [])].reverse().find((item) => item.cardId === cardId);
  return record?.drawnAt || null;
}

function getCardAccent(card) {
  const tier = card?.rarityTier || "A";
  return card?.accent || RARITY_META[tier]?.accent || "#ff8fa8";
}

function getRarityWeight(card) {
  return RARITY_META[card.rarityTier]?.weight || 1;
}

function getRarityLine(card) {
  return RARITY_META[card.rarityTier]?.rarityLine || "今日喜欢";
}

function startCountdown() {
  window.clearInterval(state.countdownTimer);
  updateCountdown();
  state.countdownTimer = window.setInterval(updateCountdown, 1000);
}

function updateCountdown() {
  const diff = Math.max(0, CONFIG.targetDate.getTime() - Date.now());
  const totalSeconds = Math.floor(diff / 1000);
  const days = Math.floor(totalSeconds / 86400);
  const hours = Math.floor((totalSeconds % 86400) / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;
  els.countdownText.textContent = `${days} 天 ${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
}

function setStatus(message) {
  els.statusLine.textContent = message;
}

function formatCollectedDate(value) {
  if (!value) {
    return "抽到日期：未知";
  }

  return `抽到日期：${new Intl.DateTimeFormat("zh-CN", {
    timeZone: "Asia/Shanghai",
    month: "2-digit",
    day: "2-digit"
  }).format(new Date(value))}`;
}

function formatFullDateTime(value) {
  return new Intl.DateTimeFormat("zh-CN", {
    timeZone: "Asia/Shanghai",
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    hour12: false
  }).format(new Date(value));
}

function wait(ms) {
  return new Promise((resolve) => window.setTimeout(resolve, ms));
}

function pad(value) {
  return String(value).padStart(2, "0");
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function trimEndingPeriod(value) {
  return String(value).replace(/[。.]$/, "");
}
